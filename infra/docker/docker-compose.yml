version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: legislativo_postgres
    environment:
      POSTGRES_DB: legislativo
      POSTGRES_USER: legislativo
      POSTGRES_PASSWORD: legislativo_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U legislativo"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: legislativo_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: legislativo_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: legislativo
      MINIO_ROOT_PASSWORD: legislativo_secret_minio
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: legislativo_keycloak
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/legislativo
      KC_DB_USERNAME: legislativo
      KC_DB_PASSWORD: legislativo_secret
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json

  camunda:
    image: camunda/camunda-bpm-platform:run-latest
    container_name: legislativo_camunda
    environment:
      CAMUNDA_BPM_DATABASE_TYPE: postgresql
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/legislativo
      SPRING_DATASOURCE_USERNAME: legislativo
      SPRING_DATASOURCE_PASSWORD: legislativo_secret
    ports:
      - "8085:8080"
    depends_on:
      postgres:
        condition: service_healthy

  mailhog:
    image: mailhog/mailhog:latest
    container_name: legislativo_mailhog
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  postgres_data:
  redis_data:
  minio_data:
